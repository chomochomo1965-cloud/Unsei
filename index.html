<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎲 今日の運勢 🎲</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: #87CEFA;
  margin:0;
  padding-bottom:160px;
}
h1{ font-size:32px; margin-top:30px; }

.scene{
  display:flex;
  justify-content:center;
  gap:60px;
  margin:50px;
  perspective:800px;
}

.dice{
  width:120px;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.face{
  position:absolute;
  width:120px;
  height:120px;
  background:white;
  border:3px solid #333;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
}

.dot{
  width:24px;
  height:24px;
  background:black;
  border-radius:50%;
  margin:auto;
}

.red{ background:red; }

.front { transform:rotateY(0deg) translateZ(60px); }
.back { transform:rotateY(180deg) translateZ(60px) rotateY(180deg); }
.right { transform:rotateY(90deg) translateZ(60px); }
.left { transform:rotateY(-90deg) translateZ(60px); }
.top { transform:rotateX(-90deg) translateZ(60px); }
.bottom { transform:rotateX(90deg) translateZ(60px) rotateY(180deg); }

button{
  font-size:24px;
  padding:12px 20px;
  border-radius:12px;
  border:3px solid #333;
  background:#fff;
}

#result{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
}

.fortune-box{
  border:3px solid #333;
  border-radius:12px;
  background:#fff8dc;
  padding:15px 25px;
  display:inline-block;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🎲 今日の運勢 🎲</h1>

<div class="scene">

<div class="dice" id="dice1">
  <div class="face front"><div></div><div></div><div></div><div></div><div class="dot red"></div><div></div><div></div><div></div><div></div></div>
  <div class="face back"><div class="dot"></div><div></div><div class="dot"></div><div class="dot"></div><div></div><div class="dot"></div><div class="dot"></div><div></div><div class="dot"></div></div>
  <div class="face right"><div></div><div></div><div class="dot"></div><div></div><div class="dot red"></div><div></div><div class="dot"></div><div></div><div></div></div>
  <div class="face left"><div class="dot"></div><div></div><div class="dot"></div><div></div><div></div><div></div><div class="dot"></div><div></div><div class="dot"></div></div>
  <div class="face top"><div class="dot"></div><div></div><div class="dot"></div><div></div><div class="dot red"></div><div></div><div class="dot"></div><div></div><div class="dot"></div></div>
  <div class="face bottom"><div></div><div></div><div class="dot"></div><div></div><div></div><div></div><div class="dot"></div><div></div><div></div></div>
</div>

<div class="dice" id="dice2"></div>

</div>

<div id="result"></div>

<div id="cumulative">累計point：0</div>
<button onclick="clearTotal()">クリア</button>
<br><br>
<button onclick="roll()">サイコロをふる</button>

<script>

// コピー
document.getElementById("dice2").innerHTML =
document.getElementById("dice1").innerHTML;

// 累計
let cumulativeTotal = localStorage.getItem("total")
? parseInt(localStorage.getItem("total"))
: 0;

document.getElementById("cumulative").textContent =
"累計point：" + cumulativeTotal;

// fortune
const fortune = {
  2:["😱最悪","💀不運","😵注意","🌀空回り","🥶低調"],
  3:["😅微妙","😐普通","🙄ミス注意","😑ズレ","🤔迷う"],
  4:["🙂平和","😊まあまあ","😌安定","🙂普通","🙂OK"],
  5:["😄良い","😊いい感じ","😆上昇","🙂安定","😄順調"],
  6:["😄好調","😋満足","😎良い","😊軽快","😄快調"],
  7:["😃ラッキー","✨ツイてる","😆楽しい","😎流れ良し","🎉当たり"],
  8:["😃吉","😊良い出会い","✨好調","😆楽しい","🎯成功"],
  9:["🤩最高","🔥勢い","✨流れ良","😎自信","🎉楽しい"],
  10:["🤩無敵","🔥絶好調","✨成功","😎OK","🎯決まる"],
  11:["🔥神","👑主役","✨最強","🎉最高","😎完璧"],
  12:["👑伝説","🌈奇跡","🔥最強","🎊神回","✨完璧"]
};

function roll(){

let d1 = Math.floor(Math.random()*6)+1;
let d2 = Math.floor(Math.random()*6)+1;

let total = d1 + d2;

cumulativeTotal += total;
localStorage.setItem("total", cumulativeTotal);

// ★ランダム1つ
let list = fortune[total];
let randomFortune = list[Math.floor(Math.random()*list.length)];

document.getElementById("result").innerHTML =
"今回の結果：" + total + "<br>" +
"<div class='fortune-box'>" + randomFortune + "</div>";

document.getElementById("cumulative").textContent =
"累計point：" + cumulativeTotal;
}

function clearTotal(){
cumulativeTotal = 0;
localStorage.setItem("total", 0);
document.getElementById("cumulative").textContent = "累計point：0";
}

</script>

</body>
</html>
