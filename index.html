<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎲 今日の運勢 🎲</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: #87CEFA;
  margin:0;
  padding-bottom:160px;
}

h1{
  font-size:32px;
  margin-top:30px;
}

.scene{
  display:flex;
  justify-content:center;
  gap:60px;
  margin:50px;
  perspective:800px;
}

.dice{
  width:120px;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.face{
  position:absolute;
  width:120px;
  height:120px;
  background:white;
  border:3px solid #333;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
}

.dot{
  width:24px;
  height:24px;
  background:black;
  border-radius:50%;
  margin:auto;
}

.red{ background:red; }

.front { transform:rotateY(0deg) translateZ(60px); }
.back { transform:rotateY(180deg) translateZ(60px) rotateY(180deg); }
.right { transform:rotateY(90deg) translateZ(60px); }
.left { transform:rotateY(-90deg) translateZ(60px); }
.top { transform:rotateX(-90deg) translateZ(60px); }
.bottom { transform:rotateX(90deg) translateZ(60px) rotateY(180deg); }

button{
  font-size:24px;
  padding:12px 20px;
  cursor:pointer;
  border-radius:12px;
  background:#fff;
  border:3px solid #333;
  white-space: nowrap;
  margin:0;
}

#result{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
  white-space: pre-line;
  line-height:1.4;
}

#result .small{
  font-size:80%;
}

.fortune-box {
  border: 3px solid #333;
  border-radius: 12px;
  background: #fff8dc;
  display: inline-block;
  padding: 15px 25px;
  font-size: 26px;
  margin-top: 10px;
}

#cumulative-container {
  margin-top:20px;
  display:inline-flex;
  align-items:center;
  gap:10px;
}

#cumulative{
  font-size:24px;
  font-weight:bold;
  padding:10px 15px;
  border:3px solid #333;
  border-radius:12px;
  background:#fff;
}

.container-buttons {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display:flex;
  gap:20px;
  z-index:1000;
}
</style>
</head>

<body>

      <div class="face back"><div class="dot"></div><div></div><div class="dot"></div><div class="dot"></div><div></div><div class="dot"></div><div class="dot"></div><div></div><div class="dot"></div></div>
      <div class="face right"><div></div><div></div><div class="dot"></div><div></div><div class="dot red"></div><div></div><div class="dot"></div><div></div><div></div></div>

      <div class="face top"><div class="dot"></div><div></div><div class="dot"></div><div></div><div class="dot red"></div><div></div><div class="dot"></div><div></div><div class="dot"></div></div>
      <div class="face bottom"><div></div><div></div><div class="dot"></div><div></div><div></div><div></div><div class="dot"></div><div></div><div></div></div>
    </div>

    <div class="dice" id="dice2"></div>

  <div id="result"></div>
</div>

<div id="cumulative-container">
  <div id="cumulative">累計point：0</div>
  <button onclick="clearTotal()">クリア</button>
</div>

<div class="container-buttons">
  <button onclick="roll()">サイコロをふる</button>
</div>

};function roll(){

  let d1 = Math.floor(Math.random()*6)+1;
  let d2 = Math.floor(Math.random()*6)+1;

  const map = {
    1:"rotateX(0deg) rotateY(0deg)",
    2:"rotateX(90deg) rotateY(0deg)",
    3:"rotateX(0deg) rotateY(-90deg)",
    4:"rotateX(0deg) rotateY(90deg)",
    5:"rotateX(-90deg) rotateY(0deg)",
    6:"rotateX(180deg) rotateY(0deg)"
  };

  let dice1 = document.getElementById("dice1");
  let dice2 = document.getElementById("dice2");

  let baseTime = 800;
  let dice2Time = baseTime * 1.5;

  dice1.style.transition = "transform " + (baseTime/1000) + "s";
  dice2.style.transition = "transform " + (dice2Time/1000) + "s";

  dice1.style.transform =
    "rotateX("+(540+Math.random()*540)+"deg) rotateY("+(540+Math.random()*540)+"deg)";

  dice2.style.transform =
    "rotateX("+(540+Math.random()*540)+"deg) rotateY("+(540+Math.random()*540)+"deg)";

  setTimeout(function(){
    dice1.style.transition = "transform 0.5s";
    dice1.style.transform = map[d1];
  }, baseTime);

  setTimeout(function(){
    dice2.style.transition = "transform 0.5s";
    dice2.style.transform = map[d2];

    setTimeout(function(){

      let display1 = (d1===2)?5:(d1===5)?2:d1;
      let display2 = (d2===2)?5:(d2===5)?2:d2;

      let total = display1 + display2;

      cumulativeTotal += total;

      // 🔥 保存
      localStorage.setItem("total", cumulativeTotal);

      document.getElementById("result").innerHTML =
        "今回の結果：" + total + "<br>" +
        "<div class='fortune-box'>" + fortune[total] + "</div>";

      document.getElementById("cumulative").textContent =
        "累計point：" + cumulativeTotal;

    }, 1000);

  }, dice2Time);
}

function clearTotal(){
  cumulativeTotal = 0;

  // 🔥 保存（リセット）
  localStorage.setItem("total", 0);

  document.getElementById("cumulative").textContent = "累計point：0";
}

</script>

</body>
</html>
