<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎲 今日の運勢 🎲</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: #87CEFA;
  margin:0;
  padding-bottom:160px;
}

h1{
  font-size:32px;
  margin-top:30px;
}

.scene{
  display:flex;
  justify-content:center;
  gap:60px;
  margin:50px;
  perspective:800px;
}

.dice{
  width:120px;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.face{
  position:absolute;
  width:120px;
  height:120px;
  background:white;
  border:3px solid #333;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
}

.dot{
  width:24px;
  height:24px;
  background:black;
  border-radius:50%;
  margin:auto;
}

.red{ background:red; }

.front { transform:rotateY(0deg) translateZ(60px); }
.back { transform:rotateY(180deg) translateZ(60px) rotateY(180deg); }
.right { transform:rotateY(90deg) translateZ(60px); }
.left { transform:rotateY(-90deg) translateZ(60px); }
.top { transform:rotateX(-90deg) translateZ(60px); }
.bottom { transform:rotateX(90deg) translateZ(60px) rotateY(180deg); }

button{
  font-size:24px;
  padding:12px 20px;
  cursor:pointer;
  border-radius:12px;
  background:#fff;
  border:3px solid #333;
}

#result{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
  white-space: pre-line;
}

#result .small{
  font-size:80%;
}

.fortune-box {
  border: 3px solid #333;
  border-radius: 12px;
  background: #fff8dc;
  display: inline-block;
  padding: 15px 25px;
  font-size: 26px;
  margin-top: 10px;
}

#cumulative{
  font-size:24px;
  font-weight:bold;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🎲 今日の運勢 🎲</h1>

<div class="scene">
  <div class="dice" id="dice1"></div>
  <div class="dice" id="dice2"></div>
</div>

<div id="result"></div>

<div id="cumulative">累計point：0</div>
<button onclick="clearTotal()">クリア</button>

<br><br>
<button onclick="roll()">サイコロをふる</button>

<script>

// 累計
let cumulativeTotal = localStorage.getItem("total")
  ? parseInt(localStorage.getItem("total"))
  : 0;

document.getElementById("cumulative").textContent =
  "累計point：" + cumulativeTotal;

// ★ fortune（あなたのそのまま）
const fortune = {
  2:["😱😱😱😱😱\n<span class='small'>今日は布団から出ない方が安全かも…</span>","💀💀💀💀💀\n<span class='small'>Wi-Fiがやたら遅い日</span>","😵😵😵😵😵\n<span class='small'>何か忘れてる気がする日</span>","🌀🌀🌀🌀🌀\n<span class='small'>なぜか全部かみ合わない…</span>","🥶🥶🥶🥶🥶\n<span class='small'>冷蔵庫より寒い気分の日</span>"],
  3:["😅😅😅😐😐\n<span class='small'>靴下が片方なくなる予感</span>","😐😐😐😐😐\n<span class='small'>信号によく止まる日</span>","🙄🙄🙄🙄🙄\n<span class='small'>ちょっとしたミス多発</span>","😑😑😑😑😑\n<span class='small'>微妙にタイミングがズレる</span>","🤔🤔🤔🤔🤔\n<span class='small'>なんかモヤっとする日</span>"],
  4:["🙂🙂🙂😐😐","🙂🙂🙂🙂😐","😊😊😊😐😐","😌😌😌😐😐","🙂🙂🙂🙂🙂"],
  5:["😄😄😄😐😐","😄😄😄😄😐","😊😊😊😊😐","😆😆😆😐😐","🙂🙂🙂🙂🙂"],
  6:["😄😄😄😄😐","😋😋😋😋😐","😎😎😎😐😐","😊😊😊😊😊","😄😄😄😄😄"],
  7:["😃😃😃😃😃","✨✨✨✨✨","😆😆😆😆😆","😎😎😎😎😎","🎉🎉🎉🎉🎉"],
  8:["😃😃😃😃😃","😊😊😊😊😊","✨✨✨✨✨","😆😆😆😆😆","🎯🎯🎯🎯🎯"],
  9:["🤩🤩🤩🤩🤩","🔥🔥🔥🔥🔥","✨✨✨✨✨","😎😎😎😎😎","🎉🎉🎉🎉🎉"],
  10:["🤩🤩🤩🤩🤩","🔥🔥🔥🔥🔥","✨✨✨✨✨","😎😎😎😎😎","🎯🎯🎯🎯🎯"],
  11:["🔥🔥🔥🔥🔥","👑👑👑👑👑","✨✨✨✨✨","🎉🎉🎉🎉🎉","😎😎😎😎😎"],
  12:["👑👑👑👑👑👑","🌈🌈🌈🌈🌈","🔥🔥🔥🔥🔥🔥","🎊🎊🎊🎊🎊","✨✨✨✨✨✨"]
};

function roll(){

  let d1 = Math.floor(Math.random()*6)+1;
  let d2 = Math.floor(Math.random()*6)+1;

  let total = d1 + d2;

  cumulativeTotal += total;
  localStorage.setItem("total", cumulativeTotal);

  // ★★★★★ ここが最重要（ランダム1つ）
  let list = fortune[total];
  let randomFortune = list[Math.floor(Math.random() * list.length)];

  document.getElementById("result").innerHTML =
    "今回の結果：" + total + "<br>" +
    "<div class='fortune-box'>" + randomFortune + "</div>";

  document.getElementById("cumulative").textContent =
    "累計point：" + cumulativeTotal;
}

function clearTotal(){
  cumulativeTotal = 0;
  localStorage.setItem("total", 0);
  document.getElementById("cumulative").textContent = "累計point：0";
}

</script>

</body>
</html>
