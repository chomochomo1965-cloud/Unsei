<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎲 今日の運勢 🎲</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background:#87CEFA;
  margin:0;
  padding:40px 20px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

button{
  font-size:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

.result{
  margin-top:30px;
  font-size:26px;
  line-height:1.2; /* 行間つめる */
}

.small{
  font-size:inherit;   /* 上と同じサイズ */
  display:block;       /* 改行 */
  margin-top:-4px;     /* 間隔つめる */
}
</style>
</head>

<body>

<h1>🎲 今日の運勢 🎲</h1>

<button onclick="drawFortune()">運勢を引く！</button>

<div id="result" class="result"></div>

<script>
const fortune = {
  2: "大凶😱😱😱😱😱\n<span class='small'>今日は布団から出ない方が安全かも…</span>",
  3: "末凶😅😅😅😐😐\n<span class='small'>靴下が片方なくなる予感</span>",
  4: "小吉🙂🙂🙂😐😐\n<span class='small'>自販機でちょっと迷う日</span>",
  5: "小吉😄😄😄😐😐\n<span class='small'>普通すぎて逆にレアな日</span>",
  6: "中吉😄😄😄😄😐\n<span class='small'>コンビニでいいもの見つかるかも</span>",
  7: "中吉😃😃😃😃😃\n<span class='small'>ちょっとしたラッキーあり！</span>",
  8: "中吉😃😃😃😃😃\n<span class='small'>誰かに優しくするといいことあるよ</span>",
  9: "大吉🤩🤩🤩🤩🤩\n<span class='small'>なぜかタイミングが神がかる日</span>",
  10:"大吉🤩🤩🤩🤩🤩\n<span class='small'>今日のあなた、ちょっと無敵です</span>",
  11:"超大吉🔥🔥🔥🔥🔥\n<span class='small'>やること全部うまくいく説ある</span>",
  12:"神吉👑👑👑👑👑👑\n<span class='small'>完全に主役の日！好きに生きてOK</span>"
};

function drawFortune(){
  // サイコロ2個の合計（2～12）
  const dice1 = Math.floor(Math.random() * 6) + 1;
  const dice2 = Math.floor(Math.random() * 6) + 1;
  const total = dice1 + dice2;

  document.getElementById("result").innerHTML = fortune[total];
}
</script>

</body>
</html>
