<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎲 今日の運勢 🎲</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: #87CEFA;
  margin:0;
  padding-bottom:160px;
}
h1{
  font-size:32px;
  margin-top:30px;
}
.scene{
  display:flex;
  justify-content:center;
  gap:60px;
  margin:50px;
  perspective:800px;
}
.dice{
  width:120px;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}
.face{
  position:absolute;
  width:120px;
  height:120px;
  background:white;
  border:3px solid #333;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
}
.dot{
  width:24px;
  height:24px;
  background:black;
  border-radius:50%;
  margin:auto;
}
.red{
  background:red;
}
.front  { transform:rotateY(0deg) translateZ(60px); }
.back   { transform:rotateY(180deg) translateZ(60px) rotateY(180deg); }
.right  { transform:rotateY(90deg) translateZ(60px); }
.left   { transform:rotateY(-90deg) translateZ(60px); }
.top    { transform:rotateX(-90deg) translateZ(60px); }
.bottom { transform:rotateX(90deg) translateZ(60px) rotateY(180deg); }

button{
  font-size:24px;
  padding:12px 20px;
  cursor:pointer;
  border-radius:12px;
  background:#fff;
  border:3px solid #333;
  white-space: nowrap;
}
#result{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
  white-space: pre-line;
  line-height:1.4;
}
#result .small{
  font-size:80%;
}
.fortune-box {
  border: 3px solid #333;
  border-radius: 12px;
  background: #fff8dc;
  display: inline-block;
  padding: 15px 25px;
  font-size: 26px;
  margin-top: 10px;
}
#cumulative-container {
  margin-top:20px;
  display:inline-flex;
  align-items:center;
  gap:10px;
}
#cumulative{
  font-size:24px;
  font-weight:bold;
  padding:10px 15px;
  border:3px solid #333;
  border-radius:12px;
  background:#fff;
}
.container-buttons {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<h1>🎲 今日の運勢 🎲</h1>

<div class="scene">
  <div class="dice" id="dice1"></div>
  <div class="dice" id="dice2"></div>
</div>

<div id="result"></div>

<div id="cumulative-container">
  <div id="cumulative">累計point：0</div>
  <button onclick="clearTotal()">クリア</button>
</div>

<div class="container-buttons">
  <button onclick="roll()">サイコロをふる</button>
</div>

<script>
// サイコロ生成
function createDice(){
  return `
  <div class="face front"><div></div><div></div><div></div><div></div><div class="dot red"></div><div></div><div></div><div></div><div></div></div>
  <div class="face back"><div class="dot"></div><div></div><div class="dot"></div><div class="dot"></div><div></div><div class="dot"></div><div class="dot"></div><div></div><div class="dot"></div></div>
  <div class="face right"><div></div><div></div><div class="dot"></div><div></div><div class="dot red"></div><div></div><div class="dot"></div><div></div><div></div></div>
  <div class="face left"><div class="dot"></div><div></div><div class="dot"></div><div></div><div></div><div></div><div class="dot"></div><div></div><div class="dot"></div></div>
  <div class="face top"><div class="dot"></div><div></div><div class="dot"></div><div></div><div class="dot red"></div><div></div><div class="dot"></div><div></div><div class="dot"></div></div>
  <div class="face bottom"><div></div><div></div><div class="dot"></div><div></div><div></div><div></div><div class="dot"></div><div></div><div></div></div>
  `;
}
document.getElementById("dice1").innerHTML = createDice();
document.getElementById("dice2").innerHTML = createDice();

// 累計読み込み
let cumulativeTotal = localStorage.getItem("totalPoint")
  ? parseInt(localStorage.getItem("totalPoint"))
  : 0;

document.getElementById("cumulative").textContent = "累計point：" + cumulativeTotal;

// ランダム運勢
const fortune = {
  2:["😱😱😱😱😱\n<span class='small'>今日は布団から出ない方が安全</span>","💀💀💀💀💀\n<span class='small'>Wi-Fiが遅い日</span>","😵😵😵😵😵\n<span class='small'>忘れ物注意</span>","🌀🌀🌀🌀🌀\n<span class='small'>全部ズレる日</span>","🥶🥶🥶🥶🥶\n<span class='small'>寒い気分の日</span>"],
  3:["😅😅😅😐😐\n<span class='small'>靴下片方消える</span>","😐😐😐😐😐\n<span class='small'>信号運悪い</span>","🙄🙄🙄🙄🙄\n<span class='small'>小ミス多い</span>","😑😑😑😑😑\n<span class='small'>ズレる日</span>","🤔🤔🤔🤔🤔\n<span class='small'>モヤっと</span>"],
  4:["🙂🙂🙂😐😐","🙂🙂🙂🙂😐","😊😊😊😐😐","😌😌😌😐😐","🙂🙂🙂🙂🙂"],
  5:["😄😄😄😐😐","😄😄😄😄😐","😊😊😊😊😐","😆😆😆😐😐","🙂🙂🙂🙂🙂"],
  6:["😄😄😄😄😐","😋😋😋😋😐","😎😎😎😐😐","😊😊😊😊😊","😄😄😄😄😄"],
  7:["😃😃😃😃😃","✨✨✨✨✨","😆😆😆😆😆","😎😎😎😎😎","🎉🎉🎉🎉🎉"],
  8:["😃😃😃😃😃","😊😊😊😊😊","✨✨✨✨✨","😆😆😆😆😆","🎯🎯🎯🎯🎯"],
  9:["🤩🤩🤩🤩🤩","🔥🔥🔥🔥🔥","✨✨✨✨✨","😎😎😎😎😎","🎉🎉🎉🎉🎉"],
  10:["🤩🤩🤩🤩🤩","🔥🔥🔥🔥🔥","✨✨✨✨✨","😎😎😎😎😎","🎯🎯🎯🎯🎯"],
  11:["🔥🔥🔥🔥🔥","👑👑👑👑👑","✨✨✨✨✨","🎉🎉🎉🎉🎉","😎😎😎😎😎"],
  12:["👑👑👑👑👑👑","🌈🌈🌈🌈🌈","🔥🔥🔥🔥🔥🔥","🎊🎊🎊🎊🎊","✨✨✨✨✨✨"]
};

function roll(){
  let d1 = Math.floor(Math.random()*6)+1;
  let d2 = Math.floor(Math.random()*6)+1;

  const map = {
    1:"rotateX(0deg)",
    2:"rotateX(90deg)",
    3:"rotateY(-90deg)",
    4:"rotateY(90deg)",
    5:"rotateX(-90deg)",
    6:"rotateX(180deg)"
  };

  let dice1 = document.getElementById("dice1");
  let dice2 = document.getElementById("dice2");

  dice1.style.transform = map[d1];
  dice2.style.transform = map[d2];

  let display1 = (d1===2)?5:(d1===5)?2:d1;
  let display2 = (d2===2)?5:(d2===5)?2:d2;
  let total = display1 + display2;

  cumulativeTotal += total;
  localStorage.setItem("totalPoint", cumulativeTotal);

  let randomFortune = fortune[total][Math.floor(Math.random()*fortune[total].length)];

  document.getElementById("result").innerHTML =
    "今回の結果：" + total + "<br>" +
    "<div class='fortune-box'>" + randomFortune + "</div>";

  document.getElementById("cumulative").textContent = "累計point：" + cumulativeTotal;
}

function clearTotal(){
  cumulativeTotal = 0;
  localStorage.setItem("totalPoint", 0);
  document.getElementById("cumulative").textContent = "累計point：0";
}
</script>

</body>
</html>
